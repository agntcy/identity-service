name: cross-domain-stack

# Cross-domain agent remediation demo — sequence diagram:
#   local scan → discovery → cross-domain token exchange → PDP (mocked) →
#   sub-agent spawn → Gitea PR audit
#
# Actors from the diagram:
#   Sarah          → demo user (Org A), signs in via Keycloak A
#   OpenCode       → Org A AI agent (mock), phases A+B steps 1-13
#   AGNTCY         → identity node (badge/VC registry) + idjag-issuer (assertion mint)
#   Keycloak A     → Org A IdP (org-a realm), authenticates Sarah
#   Envoy+OPA A    → SKIPPED (mocked ALLOW in agent stubs)
#   Keycloak B     → Org B IdP (org-b realm), receives cross-domain ID-JAG assertion
#   Envoy+OPA B    → SKIPPED (mocked ALLOW in agent stubs)
#   Triage         → Org B remediation agent (mock), steps 13-19
#   Sub-Agent      → Org B sub-agent (mock, bounded privilege), steps 20-25
#   Gitea          → resource (repository for PRs)
#
# Ports (non-conflicting with single-org-id-jag-app-access defaults):
#   keycloak-a      → host:8082  (Org A IdP)
#   keycloak-b      → host:8083  (Org B IdP)
#   idjag-issuer    → host:9002  (AGNTCY assertion minter)
#   identity-node   → host:4005 (REST) / 4006 (gRPC)
#   gitea           → host:3002
#   gitea-gateway   → host:9103  (Org B resource enforcer)
#   opencode-agent  → host:8100  (Org A mock agent)
#   triage-agent    → host:8200  (Org B mock agent)
#   sub-agent       → host:8300  (Org B sub-agent)
#
# Quick start:
#   cp .env.example .env          # edit the change-me-* values
#   docker compose up -d
#   curl http://localhost:8100/api/run   # trigger the full sequence

services:

  # ---------------------------------------------------------------------------
  # Keycloak A — Org A IdP (realm: org-a)
  #   - Authenticates Sarah (password grant → opencode-agent client)
  #   - ID-JAG IdP wired to idjag-issuer's JWKS
  #   - standard.token.exchange enabled on opencode-agent (RFC 8693, step 7)
  # ---------------------------------------------------------------------------
  keycloak-a:
    image: quay.io/keycloak/keycloak:26.7
    container_name: cd-keycloak-a
    command: >
      start-dev --import-realm
      --features=identity-assertion-jwt,token-exchange-delegation,parameterized-scopes
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_A_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_A_ADMIN_PASSWORD:?set KC_A_ADMIN_PASSWORD in .env}
      KC_HTTP_PORT: 8080
    ports:
      - "${KC_A_HTTP_PORT:-8082}:8080"
    volumes:
      - ./keycloak-a:/opt/keycloak/data/import:ro
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo OK || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  # One-shot: register triage:create optional scope on opencode-agent in org-a
  kc-a-init:
    image: quay.io/keycloak/keycloak:26.7
    container_name: cd-kc-a-init
    entrypoint: bash /bootstrap-scopes.sh
    depends_on:
      keycloak-a:
        condition: service_healthy
    environment:
      KC_URL: http://keycloak-a:8080
      KC_REALM: org-a
      KC_ADMIN: ${KC_A_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KC_A_ADMIN_PASSWORD:?set KC_A_ADMIN_PASSWORD in .env}
      REQUESTER_CLIENT: opencode-agent
    volumes:
      - ./keycloak-a/bootstrap-scopes.sh:/bootstrap-scopes.sh:ro
    networks:
      - cd-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # Keycloak B — Org B IdP (realm: org-b)
  #   - Receives cross-domain ID-JAG assertions from OpenCode (jwt-bearer grant)
  #   - Issues scoped access tokens to triage-agent (triage:create) and sub-agent (gitea:*)
  #   - Sarah's identity propagated via federated ID link (id-jag IdP)
  # ---------------------------------------------------------------------------
  keycloak-b:
    image: quay.io/keycloak/keycloak:26.7
    container_name: cd-keycloak-b
    command: >
      start-dev --import-realm
      --features=identity-assertion-jwt,token-exchange-delegation,parameterized-scopes
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_B_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_B_ADMIN_PASSWORD:?set KC_B_ADMIN_PASSWORD in .env}
      KC_HTTP_PORT: 8080
    ports:
      - "${KC_B_HTTP_PORT:-8083}:8080"
    volumes:
      - ./keycloak-b:/opt/keycloak/data/import:ro
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo OK || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  # One-shot: register triage:create / gitea:* optional scopes in org-b
  kc-b-init:
    image: quay.io/keycloak/keycloak:26.7
    container_name: cd-kc-b-init
    entrypoint: bash /bootstrap-scopes.sh
    depends_on:
      keycloak-b:
        condition: service_healthy
    environment:
      KC_URL: http://keycloak-b:8080
      KC_REALM: org-b
      KC_ADMIN: ${KC_B_ADMIN:-admin}
      KC_ADMIN_PASSWORD: ${KC_B_ADMIN_PASSWORD:?set KC_B_ADMIN_PASSWORD in .env}
    volumes:
      - ./keycloak-b/bootstrap-scopes.sh:/bootstrap-scopes.sh:ro
    networks:
      - cd-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # ID-JAG issuer — AGNTCY assertion minter (trusted by both Keycloak A and B)
  #   - Generates ephemeral RSA key pair at startup; publishes JWKS at /jwks
  #   - Both KC-A and KC-B configure an id-jag IdP pointing at this JWKS URL
  #   - Mints assertions for:
  #       step  8: OpenCode → Triage cross-domain (aud=KC-B org-b realm)
  #       step 17: Triage → Sub-Agent sub-badge   (aud=KC-B org-b realm, nested act_chain)
  # ---------------------------------------------------------------------------
  idjag-issuer:
    build:
      context: ../archive/single-org-id-jag-app-access/idjag-issuer
    image: cd-idjag-issuer
    container_name: cd-idjag-issuer
    environment:
      ISSUER_URL: http://idjag-issuer:9000
      ASSERTION_TTL: ${ASSERTION_TTL:-300}
    ports:
      - "${IDJAG_PORT:-9002}:9000"
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9000/healthz').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # AGNTCY Identity Node infrastructure (Postgres + Vault + Node)
  #   - Badge (VC) registry and resolver
  #   - Steps 3-6: OpenCode would call /vc/verify here (mocked in agent stub)
  #   - Points at Keycloak A (Org A) as its OIDC issuer for tenant auth
  # ---------------------------------------------------------------------------
  identity-postgres:
    image: postgres:16
    container_name: cd-identity-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-identity}
    volumes:
      - cd-identity-postgres-data:/var/lib/postgresql/data
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-vault:
    image: hashicorp/vault:1.17
    container_name: cd-identity-vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:?set VAULT_DEV_ROOT_TOKEN in .env}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  identity-node:
    image: ghcr.io/agntcy/identity/node:0.0.23
    container_name: cd-identity-node
    pull_policy: always
    depends_on:
      identity-postgres:
        condition: service_healthy
      identity-vault:
        condition: service_healthy
    ports:
      - "${IDENTITY_NODE_REST_PORT:-4005}:4000"
      - "${IDENTITY_NODE_GRPC_PORT:-4006}:4001"
    environment:
      DB_HOST: identity-postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-identity}
      VAULT_HOST: identity-vault
      VAULT_DEV_ROOT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:?set VAULT_DEV_ROOT_TOKEN in .env}
      GO_ENV: development
      LOG_LEVEL: DebugLevel
      IAM_ORGANIZATION: ${IAM_ORGANIZATION:-cross-domain-demo}
      SECRETS_CRYPTO_KEY: ${SECRETS_CRYPTO_KEY:?set SECRETS_CRYPTO_KEY in .env}
      # Keycloak A is the OIDC issuer for Org A agents registering badges
      IAM_ISSUER: http://keycloak-a:8080/realms/org-a
      IAM_USER_CID: opencode-agent
      IAM_USER_CID_CLAIM_NAME: azp
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4000 && nc -z 127.0.0.1 4001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Gitea — the protected resource (repository server)
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.22
    container_name: cd-gitea
    environment:
      GITEA__database__DB_TYPE: sqlite3
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL:-http://localhost:3002/}
      GITEA__server__HTTP_PORT: 3000
      GITEA__security__INSTALL_LOCK: "true"
      GITEA__service__DISABLE_REGISTRATION: "true"
      USER_UID: 1000
      USER_GID: 1000
    volumes:
      - cd-gitea-data:/data
    ports:
      - "${GITEA_HTTP_PORT:-3002}:3000"
      - "${GITEA_SSH_PORT:-2223}:22"
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  gitea-init:
    image: gitea/gitea:1.22
    container_name: cd-gitea-init
    entrypoint: sh /init.sh
    user: git
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      GITEA_INTERNAL_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-demo-admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:?set GITEA_ADMIN_PASSWORD in .env}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - cd-gitea-data:/data
      - ./gitea/init.sh:/init.sh:ro
    networks:
      - cd-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # Gitea gateway — enforces Org B narrow scoping in front of Gitea
  #   - Validates tokens issued by Keycloak B (org-b realm) via JWKS
  #   - Scope enforcement: gitea:read / gitea:write / gitea:pr
  #   - Policy deny-list: demo-protected is always blocked for PR creation
  #   - Sub-Agent (step 22) calls this with its KC-B access token
  # ---------------------------------------------------------------------------
  gitea-gateway:
    build:
      context: ../archive/single-org-id-jag-app-access/gitea-gateway
    image: cd-gitea-gateway
    container_name: cd-gitea-gateway
    depends_on:
      keycloak-b:
        condition: service_healthy
      gitea:
        condition: service_healthy
    ports:
      - "${GITEA_GATEWAY_PORT:-9103}:9100"
    environment:
      # Validate tokens against Keycloak B (Org B)
      KEYCLOAK_URL: http://keycloak-b:8080
      KEYCLOAK_REALM: org-b
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-demo-admin}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD:?set GITEA_ADMIN_PASSWORD in .env}
      GITEA_READ_SCOPE: gitea:read
      GITEA_WRITE_SCOPE: gitea:write
      GITEA_PR_SCOPE: gitea:pr
      GITEA_DENY_LIST: demo-protected
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:9100/healthz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # OpenCode Agent (mock) — Org A AI agent
  #   Phase A (steps 1-2): Sarah sign-in, mock CVE scan
  #   Discovery (steps 3-6): badge resolution (mocked → identity-node)
  #   Phase B (steps 7-13): RFC 8693 exchange (mocked), mint ID-JAG, redeem at KC-B, create ticket
  #
  # Trigger: POST http://localhost:8100/api/run
  # ---------------------------------------------------------------------------
  opencode-agent:
    build:
      context: ./opencode-agent
    image: cd-opencode-agent
    container_name: cd-opencode-agent
    depends_on:
      keycloak-a:
        condition: service_healthy
      keycloak-b:
        condition: service_healthy
      idjag-issuer:
        condition: service_healthy
      triage-agent:
        condition: service_started
    ports:
      - "${OPENCODE_PORT:-8100}:8100"
    environment:
      # Org A IdP — Sarah's login
      KC_A_URL: http://keycloak-a:8080
      KC_A_REALM: org-a
      OPENCODE_CLIENT_ID: opencode-agent
      OPENCODE_CLIENT_SECRET: ${OPENCODE_CLIENT_SECRET:-demo-opencode-secret-change-me}
      SARAH_USER: ${SARAH_USER:-sarah}
      SARAH_PASSWORD: ${SARAH_PASSWORD:?set SARAH_PASSWORD in .env}
      SARAH_EMAIL: ${SARAH_EMAIL:-sarah@org-a.example}
      # Org B IdP — receives cross-domain assertion
      KC_B_URL: http://keycloak-b:8080
      KC_B_REALM: org-b
      TRIAGE_CLIENT_ID: triage-agent
      TRIAGE_CLIENT_SECRET: ${TRIAGE_CLIENT_SECRET:-demo-triage-secret-change-me}
      # AGNTCY services
      IDJAG_ISSUER_URL: http://idjag-issuer:9000
      IDENTITY_NODE_URL: http://identity-node:4000
      # Downstream Org B agent
      TRIAGE_AGENT_URL: http://triage-agent:8200
      # Default scan target
      SCAN_REPO: ${SCAN_REPO:-demo-admin/payments-service}
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8100/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Triage Agent (mock) — Org B remediation agent
  #   Steps 13-19: receive ticket → mock OPA → plan → mint sub-badge → spawn sub-agent
  #
  # Called by OpenCode (step 13) with a Keycloak B access token.
  # ---------------------------------------------------------------------------
  triage-agent:
    build:
      context: ./triage-agent
    image: cd-triage-agent
    container_name: cd-triage-agent
    depends_on:
      keycloak-b:
        condition: service_healthy
      idjag-issuer:
        condition: service_healthy
      sub-agent:
        condition: service_started
    ports:
      - "${TRIAGE_PORT:-8200}:8200"
    environment:
      KC_B_URL: http://keycloak-b:8080
      KC_B_REALM: org-b
      TRIAGE_CLIENT_ID: triage-agent
      SUB_AGENT_CLIENT_ID: sub-agent
      IDJAG_ISSUER_URL: http://idjag-issuer:9000
      IDENTITY_NODE_URL: http://identity-node:4000
      SUB_AGENT_URL: http://sub-agent:8300
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8200/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Sub-Agent (mock) — Org B, bounded privilege
  #   Steps 20-25: jwt-bearer exchange → push file → open PR → OPA (mocked) → PR created
  #
  # Spawned by Triage with a narrowed sub-badge carrying:
  #   - caps ⊆ parent (gitea:write gitea:pr only, no triage:create)
  #   - nested act-chain: Sarah → OpenCode → Triage → Sub-Agent
  # ---------------------------------------------------------------------------
  sub-agent:
    build:
      context: ./sub-agent
    image: cd-sub-agent
    container_name: cd-sub-agent
    depends_on:
      keycloak-b:
        condition: service_healthy
      idjag-issuer:
        condition: service_healthy
      gitea-gateway:
        condition: service_healthy
    ports:
      - "${SUB_AGENT_PORT:-8300}:8300"
    environment:
      KC_B_URL: http://keycloak-b:8080
      KC_B_REALM: org-b
      SUB_AGENT_CLIENT_ID: sub-agent
      SUB_AGENT_CLIENT_SECRET: ${SUB_AGENT_CLIENT_SECRET:-demo-subagent-secret-change-me}
      IDJAG_ISSUER_URL: http://idjag-issuer:9000
      GITEA_GATEWAY_URL: http://gitea-gateway:9100
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER:-demo-admin}
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8300/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ---------------------------------------------------------------------------
  # AGNTCY Directory Node — content-addressed agent VC registry
  #   - Stores OASF agent records (opencode-agent, triage-agent, sub-agent)
  #   - Per-turn record push from webapp (step 3: dir-push)
  #   - Agent discovery by name (step 4: dir-search)
  # ---------------------------------------------------------------------------
  dir-postgres:
    image: postgres:16
    container_name: cd-dir-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DIR_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: directory
    volumes:
      - cd-dir-postgres-data:/var/lib/postgresql/data
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  dir-zot:
    image: ghcr.io/project-zot/zot:v2.1.17
    container_name: cd-dir-zot
    volumes:
      - ./dir/zot-config.json:/etc/zot/config.json:ro
      - cd-dir-zot-data:/var/lib/registry
    ports:
      - "${DIR_ZOT_PORT:-5556}:5000"
    networks:
      - cd-net
    # zot is a distroless image (no shell/wget/nc) — cannot exec a CMD-SHELL
    # probe, so dependents key off service_started instead of service_healthy.

  dir-apiserver:
    image: ghcr.io/agntcy/dir-apiserver:v1.6.0
    container_name: cd-dir-apiserver
    pull_policy: always
    depends_on:
      dir-postgres:
        condition: service_healthy
      dir-zot:
        condition: service_started
    ports:
      - "${DIR_APISERVER_PORT:-8888}:8888"
    environment:
      DIRECTORY_SERVER_LISTEN_ADDRESS: 0.0.0.0:8888
      DIRECTORY_SERVER_STORE_OCI_REGISTRY_ADDRESS: dir-zot:5000
      DIRECTORY_SERVER_STORE_OCI_REPOSITORY_NAME: dir
      DIRECTORY_SERVER_DATABASE_POSTGRES_HOST: dir-postgres
      DIRECTORY_SERVER_DATABASE_POSTGRES_PORT: 5432
      DIRECTORY_SERVER_DATABASE_POSTGRES_DATABASE: directory
      DIRECTORY_SERVER_DATABASE_POSTGRES_USERNAME: postgres
      DIRECTORY_SERVER_DATABASE_POSTGRES_PASSWORD: ${DIR_POSTGRES_PASSWORD:-postgres}
      DIRECTORY_SERVER_ROUTING_LISTEN_ADDRESS: /ip4/0.0.0.0/tcp/8999
      DIRECTORY_SERVER_AUTHN_ENABLED: "false"
      DIRECTORY_SERVER_AUTHZ_ENABLED: "false"
      # schema.oasf.agntcy.org is unresolvable from this sandbox's egress;
      # schema.oasf.outshift.com is Cisco Outshift's mirror of the same OASF schema service.
      DIRECTORY_SERVER_OASF_API_VALIDATION_SCHEMA_URL: https://schema.oasf.outshift.com
    networks:
      - cd-net
    # distroless image (no shell/nc) — cannot exec a CMD-SHELL probe;
    # dependents key off service_started instead of service_healthy.
    #
    # Note: ghcr.io/agntcy/dir-ctl is the `dirctl` one-shot CLI, not a daemon —
    # there is no reconciler/sync sidecar to run here. dir-apiserver stores
    # directly to dir-postgres + dir-zot on its own, so Push/Search work
    # without an additional reconciler process.

  agent-dir-init:
    build:
      context: ./agent-dir-init
    image: cd-agent-dir-init
    container_name: cd-agent-dir-init
    depends_on:
      dir-apiserver:
        condition: service_started
    environment:
      DIR_APISERVER_URL: dir-apiserver:8888
    networks:
      - cd-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # identity-node-init — bootstraps the identity-node issuer settings
  # ---------------------------------------------------------------------------
  identity-node-init:
    image: python:3.12-slim
    container_name: cd-identity-node-init
    entrypoint: python /init.py
    depends_on:
      identity-node:
        condition: service_healthy
      identity-vault:
        condition: service_healthy
    environment:
      IDENTITY_NODE_URL: http://identity-node:4000
      VAULT_ADDR: http://identity-vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:?set VAULT_DEV_ROOT_TOKEN in .env}
      VAULT_KEY_NAME: org-a-issuer
      ORG_A_COMMON_NAME: org-a
    volumes:
      - ./identity-node-init.py:/init.py:ro
    networks:
      - cd-net
    restart: "no"

  # ---------------------------------------------------------------------------
  # Demo webapp — animated sequence diagram UI
  # ---------------------------------------------------------------------------
  webapp:
    build:
      context: ./webapp
    image: cd-webapp
    container_name: cd-webapp
    depends_on:
      keycloak-a:
        condition: service_healthy
      keycloak-b:
        condition: service_healthy
      idjag-issuer:
        condition: service_healthy
      identity-node:
        condition: service_healthy
      identity-vault:
        condition: service_healthy
      identity-node-init:
        condition: service_completed_successfully
      dir-apiserver:
        condition: service_started
      triage-agent:
        condition: service_started
    ports:
      - "${WEBAPP_PORT:-8090}:8090"
    environment:
      KC_A_URL: http://keycloak-a:8080
      KC_A_REALM: org-a
      KC_B_URL: http://keycloak-b:8080
      KC_B_REALM: org-b
      OPENCODE_CLIENT_ID: opencode-agent
      OPENCODE_CLIENT_SECRET: ${OPENCODE_CLIENT_SECRET:-demo-opencode-secret-change-me}
      TRIAGE_CLIENT_ID: triage-agent
      TRIAGE_CLIENT_SECRET: ${TRIAGE_CLIENT_SECRET:-demo-triage-secret-change-me}
      SARAH_USER: ${SARAH_USER:-sarah}
      SARAH_PASSWORD: ${SARAH_PASSWORD:?set SARAH_PASSWORD in .env}
      SARAH_EMAIL: ${SARAH_EMAIL:-sarah@org-a.example}
      IDJAG_ISSUER_URL: http://idjag-issuer:9000
      IDENTITY_NODE_URL: http://identity-node:4000
      TRIAGE_AGENT_URL: http://triage-agent:8200
      DIR_APISERVER_URL: dir-apiserver:8888
      VAULT_ADDR: http://identity-vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN:?set VAULT_DEV_ROOT_TOKEN in .env}
      VAULT_KEY_NAME: org-a-issuer
      ORG_A_COMMON_NAME: org-a
      SCAN_REPO: ${SCAN_REPO:-demo-admin/payments-service}
    networks:
      - cd-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8090/api/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  cd-net:
    driver: bridge

volumes:
  cd-gitea-data:
  cd-identity-postgres-data:
  cd-dir-postgres-data:
  cd-dir-zot-data:
